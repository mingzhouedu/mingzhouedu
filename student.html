<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学生端 - 明舟教育背单词</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f0f8ff;
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
        }

        /* 登录面板 */
        .login-panel {
            background: #fff;
            border: 2px solid #a9c6e9;
            border-radius: 12px;
            padding: 30px;
            margin-top: 60px;
            text-align: center;
            box-shadow: 2px 2px 8px #ccc;
        }
        .login-title {
            color: #2b85ff;
            font-size: 24px;
            margin-bottom: 25px;
        }
        .login-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #aad4ff;
            border-radius: 6px;
            font-size: 16px;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #2b85ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            cursor: pointer;
            margin-top: 10px;
        }
        .tip {
            color: red;
            margin-top: 10px;
            display: none;
        }

        /* 主界面 */
        .main {
            display: none;
        }
        .main-head {
            background: #a9c6e9;
            border: 2px solid #6da8f0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            color: #036;
            font-size: 20px;
            margin-bottom: 15px;
        }
        .resource-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            background: #e6f7ff;
            border: 1px solid #aad4ff;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
        }
        .main-btn-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .main-btn {
            padding: 18px;
            border: 2px solid #6da8f0;
            border-radius: 8px;
            background: #fff;
            font-size: 17px;
            cursor: pointer;
            color: #036;
        }
        .main-btn:hover {
            background: #d1e7ff;
        }

        /* 阅读页面 */
        .read-page {
            display: none;
        }
        .back-btn {
            padding: 8px 16px;
            background: #aad4ff;
            border: 1px solid #6da8f0;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .read-box {
            background: #fff;
            border: 2px solid #a9c6e9;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .read-title {
            text-align: center;
            color: #036;
            margin-bottom: 15px;
        }
        .select-line {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .select-line select, .select-line button {
            flex: 1;
            padding: 10px;
            border: 1px solid #aad4ff;
            border-radius: 6px;
        }
        .select-line button {
            background: #2b85ff;
            color: #fff;
            cursor: pointer;
            border: none;
        }
        .article-box {
            background: #f7fbff;
            border-left: 4px solid #2b85ff;
            padding: 20px;
            line-height: 1.7;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .question-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .option {
            padding: 8px;
            margin: 6px 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
        }
        .option.selected { background: #d1e7ff; border-color: #2b85ff; }
        .option.correct { background: #dff2bf; border-color: #4cae4c; }
        .option.wrong { background: #ffbaba; border-color: #d43f3a; }
        .action-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .action-row button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: #fff;
        }
        .btn-check { background: #2b85ff; }
        .btn-new { background: #f0ad4e; }

        /* ===================== 老版QQ农场+牧场核心 ===================== */
        .farm-pasture-page {
            display: none;
        }
        .qq-head {
            background: #6da8f0;
            color: #fff;
            padding: 12px;
            text-align: center;
            border-radius: 8px 8px 0 0;
            font-weight: bold;
            font-size: 18px;
        }
        .tab-bar {
            display: flex;
            background: #a9c6e9;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            background: #c6e2ff;
            border: none;
        }
        .tab.active {
            background: #fff;
            color: #2b85ff;
        }

        /* 老版QQ农场样式 */
        .farm-page {
            background: #fff;
            border: 2px solid #a9c6e9;
            border-radius: 0 0 8px 8px;
            padding: 15px;
        }
        .farm-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .land {
            width: 100%;
            aspect-ratio: 1/1;
            background: #d9bb93; /* 老版土地色 */
            border: 2px solid #b1906f;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-size: 12px;
            cursor: pointer;
        }
        .land.planted {
            background: #b1d993;
        }
        .land-text {
            margin-top: 4px;
            font-weight: bold;
        }

        /* 老版QQ牧场样式 */
        .pasture-page {
            background: #fff;
            border: 2px solid #a9c6e9;
            border-radius: 0 0 8px 8px;
            padding: 15px;
            display: none;
        }
        .animal-area {
            margin: 20px 0;
        }
        .animal-box {
            background: #e6f7ff;
            border: 2px solid #aad4ff;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin: 15px 0;
        }
        .animal-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .animal-btn {
            padding: 10px 16px;
            background: #2b85ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<!-- 登录 -->
<div class="login-panel" id="loginPanel">
    <h2 class="login-title">📖 学生登录</h2>
    <input class="login-input" id="user" placeholder="账号">
    <input class="login-input" id="pwd" type="password" placeholder="密码">
    <button class="login-btn" onclick="login()">登录</button>
    <p class="tip" id="errTip">账号或密码错误</p>
</div>

<!-- 主界面 -->
<div class="main" id="mainPage">
    <div class="main-head">🐾 明舟教育学习中心</div>
    <div class="resource-bar">
        <span>🌾 牧草：<span id="grass">0</span></span>
        <span>💧 水分：<span id="water">0</span></span>
    </div>
    <div class="main-btn-box">
        <button class="main-btn" onclick="goRead()">📖 分级阅读训练</button>
        <button class="main-btn" onclick="goFarmPasture()">🚜 QQ农场+牧场</button>
        <button class="main-btn" onclick="logout()">退出登录</button>
    </div>
</div>

<!-- 阅读页面 -->
<div class="read-page" id="readPage">
    <button class="back-btn" onclick="backMain()">← 返回主页</button>
    <div class="read-box">
        <h3 class="read-title">新课标分级阅读</h3>
        <div class="select-line">
            <select id="grade">
                <option value="3">三年级</option>
                <option value="4">四年级</option>
                <option value="5">五年级</option>
                <option value="6">六年级</option>
            </select>
            <button onclick="genRead()">生成阅读</button>
        </div>
        <div id="readResult" style="display:none;">
            <div class="article-box" id="article"></div>
            <div id="questions"></div>
            <div class="action-row">
                <button class="btn-check" onclick="checkAns()">提交批改</button>
                <button class="btn-new" onclick="genRead()">重新生成</button>
            </div>
        </div>
    </div>
</div>

<!-- ===================== QQ农场+牧场页面 ===================== -->
<div class="farm-pasture-page" id="farmPasturePage">
    <button class="back-btn" onclick="backMain()">← 返回主页</button>
    <div class="qq-head">经典QQ农场+牧场</div>
    <div class="tab-bar">
        <button class="tab active" onclick="switchTab('farm')">🌾 农场</button>
        <button class="tab" onclick="switchTab('pasture')">🐮 牧场</button>
    </div>

    <!-- 农场 -->
    <div class="farm-page" id="farmPage">
        <div class="farm-grid">
            <div class="land" onclick="plant(0)"><div class="land-text">空地</div></div>
            <div class="land" onclick="plant(1)"><div class="land-text">空地</div></div>
            <div class="land" onclick="plant(2)"><div class="land-text">空地</div></div>
            <div class="land" onclick="plant(3)"><div class="land-text">空地</div></div>
            <div class="land" onclick="plant(4)"><div class="land-text">空地</div></div>
            <div class="land" onclick="plant(5)"><div class="land-text">空地</div></div>
            <div class="land" onclick="plant(6)"><div class="land-text">空地</div></div>
            <div class="land" onclick="plant(7)"><div class="land-text">空地</div></div>
        </div>
    </div>

    <!-- 牧场 -->
    <div class="pasture-page" id="pasturePage">
        <div class="animal-area">
            <div class="animal-box">
                <div class="animal-icon">🐔</div>
                <h3>小鸡</h3>
                <p>消耗水分喂养</p>
                <button class="animal-btn" onclick="feedChicken()">喂养小鸡</button>
            </div>
            <div class="animal-box">
                <div class="animal-icon">🐮</div>
                <h3>小牛</h3>
                <p>消耗水分喂养</p>
                <button class="animal-btn" onclick="feedCow()">喂养小牛</button>
            </div>
        </div>
    </div>
</div>

<script>
let username = "";
let res = {grass:0, water:0};
let lands = Array(8).fill(null);
let currentTab = "farm";
let qs = [];
let userAns = {};

// 登录
function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pwd").value;
    if(!u||!p) {alert("请输入账号密码");return;}
    username = u;
    loadData();
    document.getElementById("loginPanel").style.display = "none";
    document.getElementById("mainPage").style.display = "block";
}

// 加载数据
function loadData() {
    let d = localStorage.getItem("farm_data_"+username);
    if(d) {
        let obj = JSON.parse(d);
        res = obj.res || {grass:0, water:0};
        lands = obj.lands || Array(8).fill(null);
    }
    refreshRes();
    refreshLand();
}

// 保存数据
function saveData() {
    localStorage.setItem("farm_data_"+username, JSON.stringify({res, lands}));
}

// 刷新资源
function refreshRes() {
    document.getElementById("grass").innerText = res.grass;
    document.getElementById("water").innerText = res.water;
}

// 页面跳转
function backMain() {
    document.getElementById("readPage").style.display = "none";
    document.getElementById("farmPasturePage").style.display = "none";
    document.getElementById("mainPage").style.display = "block";
}
function goRead() {
    document.getElementById("mainPage").style.display = "none";
    document.getElementById("readPage").style.display = "block";
}
function goFarmPasture() {
    document.getElementById("mainPage").style.display = "none";
    document.getElementById("farmPasturePage").style.display = "block";
    switchTab("farm");
}
function logout() {location.reload();}

// 标签切换
function switchTab(t) {
    currentTab = t;
    document.querySelectorAll(".tab").forEach(tab=>tab.classList.remove("active"));
    event.target.classList.add("active");
    document.getElementById("farmPage").style.display = t==="farm"?"block":"none";
    document.getElementById("pasturePage").style.display = t==="pasture"?"block":"none";
}

// ===================== 农场核心 =====================
function refreshLand() {
    let items = document.querySelectorAll(".land");
    lands.forEach((val,i)=>{
        let el = items[i];
        if(val==="planted") {
            el.classList.add("planted");
            el.querySelector(".land-text").innerText = "已种植";
        } else {
            el.classList.remove("planted");
            el.querySelector(".land-text").innerText = "空地";
        }
    });
}
function plant(idx) {
    if(res.grass < 1) {alert("牧草不足！去阅读获得~");return;}
    res.grass -= 1;
    lands[idx] = "planted";
    refreshLand();
    saveData();
    alert("种植成功！");
}

// ===================== 牧场核心 =====================
function feedChicken() {
    if(res.water < 1) {alert("水分不足！去阅读获得~");return;}
    res.water -= 1;
    saveData();
    refreshRes();
    alert("小鸡喂养成功！");
}
function feedCow() {
    if(res.water < 2) {alert("水分不足！去阅读获得~");return;}
    res.water -= 2;
    saveData();
    refreshRes();
    alert("小牛喂养成功！");
}

// ===================== 阅读核心 =====================
function genRead() {
    let g = document.getElementById("grade").value;
    let data = getArt(g);
    document.getElementById("article").innerText = data.article;
    qs = data.questions;
    userAns = {};
    renderQs();
    document.getElementById("readResult").style.display = "block";
}
function renderQs() {
    let box = document.getElementById("questions");
    box.innerHTML = "";
    qs.forEach((q,i)=>{
        let div = document.createElement("div");
        div.className = "question-item";
        let ops = q.options.map((o,k)=>`
            <div class="option" id="q${i}o${k}" onclick="selAns(${i},${k})">
                ${String.fromCharCode(65+k)}. ${o}
            </div>
        `).join("");
        div.innerHTML = `<p>${i+1}. ${q.title}</p>${ops}`;
        box.appendChild(div);
    });
}
function selAns(i,k) {
    userAns[i] = k;
    document.querySelectorAll(`#q${i}o${k}`).forEach(e=>e.classList.add("selected"));
}
function checkAns() {
    qs.forEach((q,i)=>{
        q.options.forEach((o,k)=>{
            let e = document.getElementById(`q${i}o${k}`);
            e.classList.remove("correct","wrong");
            if(k===q.answer) e.classList.add("correct");
            else if(userAns[i]===k) e.classList.add("wrong");
        });
    });
    res.grass += 2;
    res.water += 1;
    saveData();
    refreshRes();
    alert("批改完成！奖励牧草+2，水分+1！");
}

// 阅读文章库
function getArt(g) {
    const bank = {
        3:{article:`Hello, my name is Li Ming. I am nine years old. I am in Grade Three. I like animals very much. My favourite animal is the rabbit. It is white. It has two long ears and a short tail. It can jump and run. I often play with it after school.`,questions:[{title:"How old is Li Ming?",options:["Eight","Nine","Ten"],answer:1},{title:"What's his favourite animal?",options:["Cat","Dog","Rabbit"],answer:2}]},
        4:{article:`My favourite season is spring. The weather is warm and sunny. Trees are green and flowers are beautiful. Birds sing in the trees. I can fly kites in the park. I can go hiking with my family.`,questions:[{title:"What's the weather like in spring?",options:["Cold","Warm","Hot"],answer:1},{title:"What can he do in spring?",options:["Fly kites","Swim","Skate"],answer:0}]},
        5:{article:`Last Sunday I went to the zoo with my family. We got up early and went there by bus. We saw tigers, lions, elephants, pandas and monkeys. The pandas were very cute.`,questions:[{title:"When did they go to the zoo?",options:["Last Saturday","Last Sunday","Last Friday"],answer:1},{title:"How did they go there?",options:["By bike","By bus","On foot"],answer:1}]},
        6:{article:`Reading is a good hobby. We can learn new words and sentences from books. We can know about different people, stories and countries. Reading makes us wise and happy.`,questions:[{title:"What can we learn from books?",options:["New words","Songs","Games"],answer:0},{title:"Reading makes us ____.",options:["Tired","Wise","Angry"],answer:1}]}
    };
    return bank[g];
}
</script>
</body>
</html>
