<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>明舟教育 - 舟楫载梦 明灯指路</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 50%, #B3E5FC 100%);
            position: relative;
        }

        /* 标题 */
        .header {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 99;
        }
        .title {
            font-size: 48px;
            color: #2c3e50;
            font-weight: bold;
        }
        .slogan {
            font-size: 24px;
            color: #2980b9;
            margin-top: 8px;
            letter-spacing: 3px;
        }

        /* 远方太阳（明舟标志） */
        .sun {
            position: absolute;
            bottom: 200px;
            left: 220px;
            width: 110px;
            height: 110px;
            background: #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 40px #FFEB3B, 0 0 80px #FFC107;
            animation: shine 2.5s infinite alternate;
            z-index: 2;
        }
        @keyframes shine {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* 海平面 */
        .sea {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 240px;
            background: #5DADE2;
            border-top: 4px solid #2980b9;
            z-index: 3;
        }

        /* 灯塔（右侧） */
        .lighthouse {
            position: absolute;
            right: 130px;
            bottom: 0;
            width: 70px;
            height: 400px;
            background: #fff;
            border-left: 8px solid #2c3e50;
            border-right: 8px solid #2c3e50;
            z-index: 10;
        }
        .lighthouse::before {
            content: '';
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 35px solid transparent;
            border-right: 35px solid transparent;
            border-bottom: 35px solid #e74c3c;
        }
        .light {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 24px;
            background: #FFEB3B;
            border-radius: 50%;
            box-shadow: 0 0 25px #FFEB3B;
            animation: flash 2s infinite alternate;
        }
        @keyframes flash {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* 小船样式 */
        .boat {
            position: absolute;
            width: 180px;
            cursor: pointer;
            z-index: 8;
            transition: all 0.2s;
        }
        .boat:hover {
            filter: brightness(1.1);
        }
        .boat-body {
            width: 180px;
            height: 34px;
            background: #fff;
            border-radius: 12px 12px 0 0;
            border: 4px solid #2c3e50;
            position: relative;
        }
        .boat-sail {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 45px solid #f39c12;
        }
        .boat-label {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 8px;
        }

        /* 小船位置 */
        #boat-english { bottom: 90px; left: 200px; }
        #boat-math { bottom: 170px; left: 200px; }

        /* 核心动画：小船驶向太阳 */
        .boat-go {
            animation: sailToSun 2.2s ease-in forwards !important;
        }
        @keyframes sailToSun {
            0% { transform: translate(0, 0); opacity: 1; }
            100% { transform: translate(650px, -100px); opacity: 0; }
        }
    </style>
</head>

<body>

<!-- 标题 -->
<div class="header">
    <div class="title">明舟教育</div>
    <div class="slogan">舟楫载梦 · 明灯指路</div>
</div>

<!-- 远方太阳 -->
<div class="sun"></div>

<!-- 海平面 -->
<div class="sea"></div>

<!-- 灯塔 -->
<div class="lighthouse">
    <div class="light"></div>
</div>

<!-- 英语小船 -->
<div class="boat" id="boat-english" onclick="sailAndGo('student.html', this)">
    <div class="boat-body">
        <div class="boat-sail"></div>
    </div>
    <div class="boat-label">📖 英语学习</div>
</div>

<!-- 数学小船 -->
<div class="boat" id="boat-math" onclick="sailAndGo('math-index.html', this)">
    <div class="boat-body">
        <div class="boat-sail"></div>
    </div>
    <div class="boat-label">🧮 数学作业</div>
</div>

<script>
// 核心函数：播放动画 → 跳转页面
function sailAndGo(targetUrl, boatEl) {
    // 先禁用点击，防止重复触发
    boatEl.style.pointerEvents = 'none';
    // 启动动画
    boatEl.classList.add('boat-go');
    // 动画结束后跳转
    setTimeout(() => {
        window.location.href = targetUrl;
    }, 2200);
}
</script>

</body>
</html>
